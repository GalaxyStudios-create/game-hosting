<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Clicker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #f7931a;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .balance {
            font-size: 2em;
            color: #333;
            font-weight: bold;
            margin: 15px 0;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: #f7931a;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .clicker-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .click-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f7931a, #ff8c00);
            border: none;
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(247, 147, 26, 0.4);
            transition: all 0.1s;
        }

        .click-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(247, 147, 26, 0.6);
        }

        .click-btn:active {
            transform: scale(0.95);
        }

        .upgrades-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-height: 600px;
            overflow-y: auto;
        }

        .upgrades-section h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .upgrade-item {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 5px solid #f7931a;
        }

        .upgrade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .upgrade-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
        }

        .upgrade-count {
            background: #f7931a;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.9em;
        }

        .upgrade-info {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .upgrade-btn {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .upgrade-btn:hover {
            background: #45a049;
        }

        .upgrade-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .rebirth-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .rebirth-section h2 {
            color: #764ba2;
            margin-bottom: 20px;
        }

        .rebirth-info {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .rebirth-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .rebirth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(118, 75, 162, 0.4);
        }

        .rebirth-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .click-effect {
            position: fixed;
            color: #f7931a;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            font-size: 1.5em;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-100px);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .balance {
                font-size: 1.5em;
            }
            
            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bitcoin Clicker</h1>
            <div class="balance">
                <span id="balance">0.000000001</span> BTC
            </div>
            <div class="stats">
                <div class="stat-item">
                    За клик: <span id="perClick">0.000000001</span> BTC
                </div>
                <div class="stat-item">
                    В секунду: <span id="perSecond">0</span> BTC
                </div>
                <div class="stat-item">
                    Перерождений: <span id="rebirths">0</span>
                </div>
                <div class="stat-item">
                    Множитель: x<span id="multiplier">1</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="clicker-section">
                <h2>Добывайте Bitcoin</h2>
                <button class="click-btn" id="clickBtn">МАЙНИТЬ</button>
                <p style="margin-top: 20px; color: #666;">
                    Всего кликов: <span id="totalClicks">0</span>
                </p>
            </div>

            <div class="upgrades-section">
                <h2>Улучшения</h2>
                <div id="upgradesContainer"></div>
            </div>
        </div>

        <div class="rebirth-section">
            <h2>Перерождение</h2>
            <div class="rebirth-info">
                <p>Перерождение сбросит весь прогресс, но даст постоянный множитель!</p>
                <p style="margin-top: 10px; font-size: 1.2em; color: #764ba2;">
                    Требуется: <span id="rebirthCost">1</span> BTC
                </p>
                <p style="margin-top: 5px;">
                    Новый множитель: x<span id="newMultiplier">2</span>
                </p>
            </div>
            <button class="rebirth-btn" id="rebirthBtn">Переродиться</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
