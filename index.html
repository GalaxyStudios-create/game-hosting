<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Биткоин Кликер: Brawl Edition</title>
    <style>
        /* Анимации */
        @keyframes float-up { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-80px); opacity: 0; } }
        @keyframes modal-pop-in { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px #ffde00, 0 0 5px #fff; } 50% { box-shadow: 0 0 30px #ffde00, 0 0 10px #fff; } }

        /* Основные стили */
        :root { --brawl-blue: #0e457f; --brawl-purple: #4c1a82; --brawl-yellow: #fde84e; --brawl-pink: #fe5591; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background: linear-gradient(135deg, var(--brawl-blue), var(--brawl-purple));
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Универсальные элементы */
        .brawl-button {
            background: linear-gradient(to bottom, #fde84e, #fbb829);
            color: #4c1a82;
            border: 3px solid #fff;
            border-radius: 15px;
            padding: 15px 25px;
            font-size: 1.2em;
            font-family: inherit;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
            box-shadow: 0 5px 0 #b36b00;
            cursor: pointer;
            transition: all 0.1s ease-out;
            text-transform: uppercase;
        }
        .brawl-button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 0 #b36b00; }
        .brawl-button:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 3px 0 #b36b00; }
        .brawl-button:disabled { background: #999; box-shadow: 0 5px 0 #555; color: #ddd; cursor: not-allowed; }
        
        .brawl-panel {
            background-color: var(--brawl-blue);
            border: 4px solid var(--brawl-yellow);
            border-radius: 20px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2), inset 0 0 10px rgba(255,255,255,0.3);
            padding: 30px;
        }

        /* Экран входа */
        #login-screen {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        #login-screen h1 { font-size: 2.5em; margin: 0; text-shadow: 3px 3px 0 var(--brawl-purple); }
        .input-field {
            padding: 15px; border-radius: 15px; border: 3px solid #fff;
            background: rgba(0,0,0,0.2); color: #fff; font-size: 1.1em;
            text-align: center; font-family: inherit; text-transform: uppercase;
        }
        #login-controls { display: flex; gap: 15px; margin-top: 10px; }
        #login-controls button { flex: 1; padding: 15px 10px; }
        #login-error { color: var(--brawl-pink); text-shadow: 1px 1px 0 #000; font-size: 0.9em; height: 20px; font-weight: bold; }

        /* Игровой контейнер */
        #game-container { display: none; width: 100%; height: 100vh; flex-direction: column; justify-content: space-between; }
        .top-bar { padding: 10px 20px; text-align: center; }
        #balance { font-size: 1.8em; text-shadow: 2px 2px 0 #000; }
        .sub-stats { font-size: 0.8em; color: #eee; }
        #logout-button { position: absolute; top: 15px; left: 15px; background: var(--brawl-pink); color: #fff; border: 2px solid #fff; border-radius: 10px; padding: 8px 10px; box-shadow: 0 3px 0 #a11b51; font-size: 0.8em; }
        .clicker-zone { display: flex; justify-content: center; align-items: center; flex-grow: 1; position: relative; }
        .coin { width: 180px; height: 180px; background: linear-gradient(45deg, #ffde00, #ffb829); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 8px solid #fff; box-shadow: 0 10px 0 #b36b00; transition: all 0.1s ease-out; }
        .coin:active { transform: translateY(5px); box-shadow: 0 5px 0 #b36b00; }
        .coin-symbol { font-size: 90px; color: #b36b00; text-shadow: 2px 2px 0px rgba(255,255,255,0.7); }
        .floating-number { position: absolute; font-size: 2em; color: var(--brawl-yellow); text-shadow: 2px 2px 0 var(--brawl-purple); pointer-events: none; animation: float-up 1.5s ease-out forwards; }
        #bottom-nav { display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.2); }
        #bottom-nav .brawl-button { font-size: 1em; padding: 12px 20px; }
        
        #modal-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 100; }
        #modal-content-wrapper { width: 90%; max-width: 500px; animation: modal-pop-in 0.3s ease-out; }
        #modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #modal-title { margin: 0; font-size: 2em; color: var(--brawl-yellow); text-shadow: 3px 3px 0 var(--brawl-purple); }
        #modal-close-button { font-size: 2em; background: var(--brawl-pink); color: #fff; border: 3px solid #fff; border-radius: 50%; width: 50px; height: 50px; text-shadow: 2px 2px 0 #a11b51; box-shadow: 0 4px 0 #a11b51; }
        #modal-body { max-height: 50vh; overflow-y: auto; padding-right: 10px; }
        .upgrade-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.3); }
        .upgrade-item button { padding: 10px; font-size: 0.9em; width: 150px; flex-shrink: 0; }
        .upgrade-title { font-weight: bold; } .upgrade-stats { font-size: 0.8em; color: #ddd; }
        button.can-afford { animation: pulse-glow 1.5s infinite; }
        #leaderboard-list li { background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        #leaderboard-list li span:first-child { color: var(--brawl-yellow); }

        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--brawl-blue); } ::-webkit-scrollbar-thumb { background: var(--brawl-yellow); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="login-screen" class="brawl-panel">
        <h1>КЛИКЕР</h1>
        <input type="text" id="username-input" class="input-field" placeholder="ВАШЕ ИМЯ">
        <input type="password" id="password-input" class="input-field" placeholder="ПАРОЛЬ">
        <input type="password" id="confirm-password-input" class="input-field" placeholder="ПОДТВЕРДИТЕ ПАРОЛЬ">
        <div id="login-controls">
            <button id="register-button" class="brawl-button">Создать</button>
            <button id="login-button" class="brawl-button">Войти</button>
        </div>
        <div id="login-error"></div>
    </div>

    <div id="game-container">
        <div class="top-bar">
            <button id="logout-button">Выйти</button>
            <div id="balance">0.00000000 BTC</div>
            <div class="sub-stats">
                Клик: <span id="click-power">0</span> | В сек: <span id="auto-per-second">0</span>
            </div>
        </div>
        
        <div class="clicker-zone">
            <div id="bitcoin-button" class="coin">
                <span class="coin-symbol">₿</span>
            </div>
        </div>

        <div id="bottom-nav">
            <button class="brawl-button" data-modal="Улучшения">Улучшения</button>
            <button class="brawl-button" data-modal="Перерождение">Перерождение</button>
            <button class="brawl-button" data-modal="Лидеры">Лидеры</button>
        </div>
    </div>

    <div id="modal-container">
        <div id="modal-content-wrapper" class="brawl-panel">
            <div id="modal-header">
                <h2 id="modal-title">Заголовок</h2>
                <button id="modal-close-button" class="brawl-button">X</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
